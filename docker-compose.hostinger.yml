services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: immobiliare_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - crm-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - crm-network
    restart: unless-stopped

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/immobiliare_crm
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      PUBLIC_BASE_URL: https://${APP_DOMAIN:-gestifacile.cloud}
      FRONTEND_URL: https://${APP_DOMAIN:-gestifacile.cloud}
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - crm-network
    restart: unless-stopped

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    networks:
      - crm-network
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.gestifacile-frontend.rule=Host(`gestifacile.cloud`) || Host(`www.gestifacile.cloud`)
      - traefik.http.routers.gestifacile-frontend.entrypoints=web,websecure
      - traefik.http.routers.gestifacile-frontend.tls=true
      - traefik.http.routers.gestifacile-frontend.tls.certresolver=letsencrypt
      - traefik.http.routers.gestifacile-frontend.service=gestifacile-frontend
      - traefik.http.services.gestifacile-frontend.loadbalancer.server.port=3000

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  crm-network:
    driver: bridge
