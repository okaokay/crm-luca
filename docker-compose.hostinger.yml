services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: immobiliare_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - crm-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - crm-network
    restart: unless-stopped

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/immobiliare_crm
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      INTERNAL_JWT_SECRET: your-internal-secret-change-in-production
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      PUBLIC_BASE_URL: https://gestifacile.cloud
      FRONTEND_URL: https://gestifacile.cloud
      WEB_PUSH_VAPID_PUBLIC_KEY: BHzF1qWeT7DUuwXM1gs-kZ8DJoN-HdZm3F5-WL0c8kxcjfPrvWZ7lqAtrJYWpwHfha6PsrGHd8tYmxPcvRZLb_w
      WEB_PUSH_VAPID_PRIVATE_KEY: juWCbyRtnlFH5igWAZvIV5xJoUluY2eIL3L5vFal7JE
      WEB_PUSH_VAPID_SUBJECT: mailto:admin@gestifacile.cloud
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - crm-network
    restart: unless-stopped

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    networks:
      - crm-network
    restart: unless-stopped
    healthcheck:
      disable: true
    labels:
      - traefik.enable=true

      - traefik.http.routers.crm-luca-http.rule=Host(`gestifacile.cloud`) || Host(`www.gestifacile.cloud`)
      - traefik.http.routers.crm-luca-http.entrypoints=web
      - traefik.http.routers.crm-luca-http.service=crm-luca-service

      - traefik.http.routers.crm-luca-https.rule=Host(`gestifacile.cloud`) || Host(`www.gestifacile.cloud`)
      - traefik.http.routers.crm-luca-https.entrypoints=websecure
      - traefik.http.routers.crm-luca-https.tls=true
      - traefik.http.routers.crm-luca-https.tls.certresolver=letsencrypt
      - traefik.http.routers.crm-luca-https.service=crm-luca-service

      - traefik.http.services.crm-luca-service.loadbalancer.server.port=3000
      - traefik.http.services.crm-luca-service.loadbalancer.server.scheme=http

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  crm-network:
    driver: bridge
